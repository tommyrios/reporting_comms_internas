name: Comms Dashboard Report

on:
  schedule:
    # 08:18 Argentina = 11:18 UTC
    - cron: '18 11 1 * *'
  workflow_dispatch:

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest dashboard email and PDF
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_TOKEN_URI: ${{ secrets.GOOGLE_TOKEN_URI }}
        run: |
          python scripts/fetch_latest_dashboard_email.py

      - name: Extract text from PDF
        run: |
          python scripts/extract_pdf_text.py

      - name: Generate AI report (Gemini)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_report.py

      - name: Send email
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_SUBJECT: Reporte automático | Dashboard Communications
        run: |
          python scripts/send_email.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-report-output
          path: |
            output/
            data/
