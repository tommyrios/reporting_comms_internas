name: Comms Period Report

on:
  schedule:
    # Corre el primer día de cada trimestre.
    # En enero, el script genera Q4 + anual del año anterior.
    - cron: '18 11 1 1,4,7,10 *'

  workflow_dispatch:
    inputs:
      report_kind:
        description: 'Tipo de reporte'
        required: true
        default: 'quarter'
        type: choice
        options:
          - quarter
          - year
      report_year:
        description: 'Año del período'
        required: true
        default: '2026'
      report_quarter:
        description: 'Trimestre 1-4 (solo para reporte trimestral)'
        required: false
        default: '1'

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test*.py'

      - name: Validate sample contracts
        run: npm run validate:sample

      - name: Render sample deck smoke test
        run: npm run render:ejecutivo

      - name: Resolve report period
        run: |
          KIND_INPUT="${{ github.event.inputs.report_kind || '' }}"
          YEAR_INPUT="${{ github.event.inputs.report_year || '' }}"
          QUARTER_INPUT="${{ github.event.inputs.report_quarter || '' }}"

          if [ -z "$KIND_INPUT" ]; then
            echo "REPORT_MODE=auto" >> "$GITHUB_ENV"
          elif [ "$KIND_INPUT" = "year" ]; then
            echo "REPORT_MODE=year" >> "$GITHUB_ENV"
            echo "REPORT_YEAR=$YEAR_INPUT" >> "$GITHUB_ENV"
          else
            echo "REPORT_MODE=quarter" >> "$GITHUB_ENV"
            echo "REPORT_YEAR=$YEAR_INPUT" >> "$GITHUB_ENV"
            echo "REPORT_QUARTER=$QUARTER_INPUT" >> "$GITHUB_ENV"
          fi

          echo "REPORT_TIMEZONE=America/Argentina/Buenos_Aires" >> "$GITHUB_ENV"
          echo "REPORT_REQUIRED_SCOPES=argentina,holding,combined" >> "$GITHUB_ENV"
          echo "ALLOW_PARTIAL_PERIOD=false" >> "$GITHUB_ENV"
          echo "ALLOW_PARTIAL_REPORT=false" >> "$GITHUB_ENV"

      - name: Run period pipeline
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_TOKEN_URI: ${{ secrets.GOOGLE_TOKEN_URI }}

          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          echo "Running report mode=$REPORT_MODE year=$REPORT_YEAR quarter=$REPORT_QUARTER"
          python scripts/run_scheduled_reports.py

      - name: Upload report.pptx artifacts required
        uses: actions/upload-artifact@v4
        with:
          name: comms-period-report-pptx
          path: output/reports/**/report.pptx
          if-no-files-found: error

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-period-report-output
          path: |
            output/
            data/reporting_periods.json
            data/fetch_result.json
