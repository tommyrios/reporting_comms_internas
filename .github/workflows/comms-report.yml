name: Comms Dashboard Report

on:
  schedule:
    - cron: '18 11 1 * *'
  workflow_dispatch:

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest dashboard email and PDF
        env:
          IMAP_HOST: ${{ secrets.IMAP_HOST }}
          IMAP_PORT: ${{ secrets.IMAP_PORT }}
          IMAP_USER: ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          EMAIL_SUBJECT: Dashboard Communications | Comunicación interna
          PDF_FILENAME: Dashboard Communications | Comunicación interna
        run: |
          python scripts/fetch_latest_dashboard_email.py

      - name: Extract text from PDF
        run: |
          python scripts/extract_pdf_text.py

      - name: Generate AI report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/generate_report.py

      - name: Send email report
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          REPORT_TO: ${{ secrets.REPORT_TO }}
          REPORT_CC: ${{ secrets.REPORT_CC }}
        run: |
          python scripts/send_email.py

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-report-output
          path: |
            output/
            data/