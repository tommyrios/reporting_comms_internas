name: Comms Period Report

on:
  schedule:
    # Corre el primer día de cada trimestre. El script resuelve el trimestre cerrado anterior.
    - cron: '18 11 1 1,4,7,10 *'

  workflow_dispatch:
    inputs:
      report_year:
        description: 'Año del período'
        required: true
        default: '2026'
      report_quarter:
        description: 'Trimestre 1-4'
        required: true
        default: '1'

jobs:
  generate-and-send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Run Python tests
        run: python -m unittest discover -s tests -p 'test*.py'

      - name: Validate sample contracts
        run: npm run validate:sample

      - name: Render sample deck smoke test
        run: npm run render:ejecutivo

      - name: Resolve report period
        run: |
          YEAR_INPUT="${{ github.event.inputs.report_year || '' }}"
          QUARTER_INPUT="${{ github.event.inputs.report_quarter || '' }}"

          if [ -n "$YEAR_INPUT" ] && [ -n "$QUARTER_INPUT" ]; then
            echo "REPORT_YEAR=$YEAR_INPUT" >> "$GITHUB_ENV"
            echo "REPORT_QUARTER=$QUARTER_INPUT" >> "$GITHUB_ENV"
          else
            python - <<'PY' >> "$GITHUB_ENV"
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("America/Argentina/Buenos_Aires"))
          current_quarter = ((now.month - 1) // 3) + 1

          if current_quarter == 1:
              report_year = now.year - 1
              report_quarter = 4
          else:
              report_year = now.year
              report_quarter = current_quarter - 1

          print(f"REPORT_YEAR={report_year}")
          print(f"REPORT_QUARTER={report_quarter}")
          PY
          fi

          echo "REPORT_MODE=quarter" >> "$GITHUB_ENV"
          echo "REPORT_REQUIRED_SCOPES=argentina,holding,combined" >> "$GITHUB_ENV"
          echo "ALLOW_PARTIAL_PERIOD=false" >> "$GITHUB_ENV"
          echo "ALLOW_PARTIAL_REPORT=false" >> "$GITHUB_ENV"
          echo "REPORT_TIMEZONE=America/Argentina/Buenos_Aires" >> "$GITHUB_ENV"

      - name: Run period pipeline
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_TOKEN_URI: ${{ secrets.GOOGLE_TOKEN_URI }}

          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}
          EMAIL_CC: ${{ secrets.EMAIL_CC }}
          EMAIL_BCC: ${{ secrets.EMAIL_BCC }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: |
          echo "Running report for year=$REPORT_YEAR quarter=$REPORT_QUARTER"
          python scripts/run_scheduled_reports.py

      - name: Upload report.pptx artifacts required
        uses: actions/upload-artifact@v4
        with:
          name: comms-period-report-pptx
          path: output/reports/**/report.pptx
          if-no-files-found: error

      - name: Upload generated artifacts
        uses: actions/upload-artifact@v4
        with:
          name: comms-period-report-output
          path: |
            output/
            data/reporting_periods.json
            data/fetch_result.json
